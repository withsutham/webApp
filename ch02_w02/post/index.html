<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MongoDB Post</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="post-container">
        <div class="post-header">
            <img src="image/avatar_image.png" alt="MongoDB" id="avatar">

            <div class="post-author">
                <span class="post-owner">MongoDB ✔</span>
                <span class="post-tag">ได้รับการสนับสนุน 🌏</span>
            </div>

            <div class="post-description">Take advantage of SQL
skillset to quickly get up to speed on MongoDB.
Don't start over, just start!</div>
        </div>

        <div class="post-body">
            <img src="image/post_image.jfif" alt="MongoDB course" id="post">

            <div class="post-link-preview">
                <div class="body" id="address">LEARN.MONGODB.COM</div>
                <div class="body" id="content">Register today for free!</div>
                <div class="body" id="description">Are you a SQL Developer? Moodeng</div>
                <button class="action-button" id="register">ลงทะเบียน</button>
            </div>
        </div>

        <div class="post-status">
            <div class="status-like">👍 2.4 พัน</div>
            <div class="status-right">
                <span class="status-comment">108 ความคิดเห็น</span>
                <span class="status-share">แชร์ 67 ครั้ง</span>
            </div>
        </div>

        <div class="post-actions">
            <button class="action-button" id="like">👍 ถูกใจ</button>
            <button class="action-button" id="comment">💬 แสดงความคิดเห็น</button>
            <button class="action-button" id="share">↗ แชร์</button>
        </div>
    </div>
</body>
</html>
