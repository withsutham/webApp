<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="สั่งซื้อเบเกอรี่และเครื่องดื่มออนไลน์จากคาเฟ่เบเกอรี่แสนอบอุ่น อบสดใหม่ทุกวัน ส่งตรงถึงบ้านคุณ">
    <meta name="keywords" content="สั่งอาหาร, สั่งเบเกอรี่, คาเฟ่เบเกอรี่แสนอบอุ่น, Warm Bakery Cafe, เค้ก, ครัวซองด์, มัทฉะ">
    <title>สั่งซื้อสินค้า - คาเฟ่เบเกอรี่แสนอบอุ่น (Order - Warm Bakery Cafe)</title>
</head>
<body>

    <header>
        <h1>คาเฟ่เบเกอรี่แสนอบอุ่น (Warm Bakery Cafe)</h1>
        <ul>
            <li><a href="../index.html">หน้าแรก (Home)</a></li>
            <li><a href="menu.html">เมนูเบเกอรี่ (Menu)</a></li>
            <li><a href="order.html">ติดต่อและสั่งซื้อ (Order)</a></li>
        </ul>
    </header>

    <main>
        <h2>แบบฟอร์มสั่งซื้อสินค้า (Order Form)</h2>

        <form action="#" method="post">
            <h2>รายการอาหารและเบเกอรี่</h2>

            <input type="checkbox" id="item-bk01" name="item_bk01" value="yes">
            <label for="item-bk01">ครัวซองด์เนยสดฝรั่งเศส (French Butter Croissant) - 85 บาท</label>
            <br>
            <label for="qty-bk01">จำนวน:</label>
            <input type="number" id="qty-bk01" name="qty_bk01" value="1">
            <br>
            <label for="inst-bk01">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-bk01" name="inst_bk01" placeholder="คำสั่งพิเศษ เช่น อุ่นร้อน">
            <br><br>

            <input type="checkbox" id="item-bk02" name="item_bk02" value="yes">
            <label for="item-bk02">พัฟสับปะรด (Pineapple Puff) - 65 บาท</label>
            <br>
            <label for="qty-bk02">จำนวน:</label>
            <input type="number" id="qty-bk02" name="qty_bk02" value="1">
            <br>
            <label for="inst-bk02">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-bk02" name="inst_bk02" placeholder="คำสั่งพิเศษ เช่น ขอซอสมะเขือเทศ">
            <br><br>

            <input type="checkbox" id="item-bk03" name="item_bk03" value="yes">
            <label for="item-bk03">เดนิชลูกเกด (Raisin Danish) - 75 บาท</label>
            <br>
            <label for="qty-bk03">จำนวน:</label>
            <input type="number" id="qty-bk03" name="qty_bk03" value="1">
            <br>
            <label for="inst-bk03">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-bk03" name="inst_bk03" placeholder="คำสั่งพิเศษ">
            <br><br>

            <input type="checkbox" id="item-ck01" name="item_ck01" value="yes">
            <label for="item-ck01">เค้กช็อกโกแลตฟัดจ์ (Chocolate Fudge Cake) - 120 บาท</label>
            <br>
            <label for="qty-ck01">จำนวน:</label>
            <input type="number" id="qty-ck01" name="qty_ck01" value="1">
            <br>
            <label for="inst-ck01">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-ck01" name="inst_ck01" placeholder="คำสั่งพิเศษ เช่น เขียนหน้าเค้ก">
            <br><br>

            <input type="checkbox" id="item-ck02" name="item_ck02" value="yes">
            <label for="item-ck02">สตรอว์เบอร์รี่ชอร์ตเค้ก (Strawberry Shortcake) - 130 บาท</label>
            <br>
            <label for="qty-ck02">จำนวน:</label>
            <input type="number" id="qty-ck02" name="qty_ck02" value="1">
            <br>
            <label for="inst-ck02">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-ck02" name="inst_ck02" placeholder="คำสั่งพิเศษ เช่น แยกสตรอว์เบอร์รี่">
            <br><br>

            <input type="checkbox" id="item-ck03" name="item_ck03" value="yes">
            <label for="item-ck03">บลูเบอร์รี่ชีสพาย (Blueberry Cheese Pie) - 140 บาท</label>
            <br>
            <label for="qty-ck03">จำนวน:</label>
            <input type="number" id="qty-ck03" name="qty_ck03" value="1">
            <br>
            <label for="inst-ck03">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-ck03" name="inst_ck03" placeholder="คำสั่งพิเศษ">
            <br><br>

            <input type="checkbox" id="item-bv01" name="item_bv01" value="yes">
            <label for="item-bv01">เอสเปรสโซ่ร้อน (Hot Espresso) - 55 บาท</label>
            <br>
            <label for="qty-bv01">จำนวน:</label>
            <input type="number" id="qty-bv01" name="qty_bv01" value="1">
            <br>
            <label for="inst-bv01">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-bv01" name="inst_bv01" placeholder="คำสั่งพิเศษ เช่น แยกน้ำตาล">
            <br><br>

            <input type="checkbox" id="item-bv02" name="item_bv02" value="yes">
            <label for="item-bv02">ชาเขียวมัทฉะลาเต้เย็น (Iced Matcha Latte) - 85 บาท</label>
            <br>
            <label for="qty-bv02">จำนวน:</label>
            <input type="number" id="qty-bv02" name="qty_bv02" value="1">
            <br>
            <label for="inst-bv02">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-bv02" name="inst_bv02" placeholder="คำสั่งพิเศษ เช่น หวานน้อย, ไม่ใส่น้ำแข็ง">
            <br><br>

            <input type="checkbox" id="item-bv03" name="item_bv03" value="yes">
            <label for="item-bv03">ชามะนาวน้ำผึ้ง (Honey Lemon Tea) - 75 บาท</label>
            <br>
            <label for="qty-bv03">จำนวน:</label>
            <input type="number" id="qty-bv03" name="qty_bv03" value="1">
            <br>
            <label for="inst-bv03">คำสั่งพิเศษ:</label>
            <input type="text" id="inst-bv03" name="inst_bv03" placeholder="คำสั่งพิเศษ">
            <br><br>


            <h2>ข้อมูลจัดส่งและผู้ติดต่อ (Customer & Delivery Information)</h2>

            <label for="fullname">ชื่อ-นามสกุล (Full Name):</label>
            <input type="text" id="fullname" name="fullname">
            <br><br>

            <label for="phone">เบอร์โทรศัพท์ (Phone Number):</label>
            <input type="tel" id="phone" name="phone" placeholder="08XXXXXXXX">
            <br><br>

            <label for="delivery-date">วันที่จัดส่ง (Delivery Date):</label>
            <input type="date" id="delivery-date" name="delivery_date">
            <br><br>

            <label for="delivery-time">เวลาจัดส่ง (Delivery Time):</label>
            <input type="time" id="delivery-time" name="delivery_time">
            <br><br>

            <label for="address">ที่อยู่จัดส่ง (Delivery Address):</label>
            <br>
            <textarea id="address" name="address" rows="4" cols="30"></textarea>
            <br><br>

            <input type="submit" value="ยืนยันรายการสั่งซื้อ">

        </form>
    </main>

</body>
</html>
