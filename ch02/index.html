<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Profile Card</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="card-container">    
        <div class="card1">
            <img src="image/image1.jpeg" alt="John Doe avatar">
            <h1>John Doe</h1>
            <p class="title">CEO & Founder, Example</p>
            <p>Harvard University</p>
            <p class="contact">Contact</p>
        </div>

        <div class="card2">
            <img src="image/image2.jpg" alt="Andrew Neil avatar">
            <h1>Andrew Neil</h1>
            <p class="address">Surkhet, Nepal</p>
            <p>User Interface Designer and Front-end Developer</p>
            <p class="message">message</p>
        </div>
    </div>
</body>
</html>
